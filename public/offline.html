<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Sarwar Hossain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --text: #f4f4f5;
      --muted: #71717a;
      --amber: #f59e0b;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      color: var(--amber);
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; }
    p  { font-size: .9rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: .5rem;
      padding: .6rem 1.4rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M8.111 8.111A6.003 6.003 0 0012 6c3.314 0 6 2.686 6 6a5.99 5.99 0 01-.525 2.461M1.5 12c0-5.799 4.701-10.5 10.5-10.5S22.5 6.201 22.5 12M12 12v3m0 3h.008v.008H12V18z" />
    </svg>
    <h1>You're offline</h1>
    <p>No internet connection. Check your network and try again — cached pages remain available.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
